version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # reqwest is pinned to 0.12: oauth2 5.0 requires reqwest ^0.12 and
      # reqwest 0.13 drops the rustls-tls feature (rustls defaults to aws-lc-rs),
      # which breaks the x86_64-pc-windows-gnu release cross-compile.
      - dependency-name: "reqwest"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
